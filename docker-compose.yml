services:
  postgres:
    image: postgres:16-alpine
    container_name: public-form-logger-postgres
    restart: unless-stopped
    ports:
      # Host:Container — host port from .env to avoid clash with other Postgres instances
      - "${POSTGRES_PORT_HOST:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - logger_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: public-form-logger-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${PORT:-4001}:4001"
    env_file:
      - .env.docker

volumes:
  logger_postgres_data:
    name: public_form_logger_postgres_data
